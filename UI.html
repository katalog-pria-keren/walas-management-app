<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard WALAS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    
    .header {
      background: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    
    .header h1 {
      color: #333;
      font-size: 28px;
      margin-bottom: 5px;
    }
    
    .header p {
      color: #999;
      font-size: 14px;
    }
    
    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 30px;
    }
    
    .card {
      background: white;
      border-radius: 10px;
      padding: 25px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }
    
    .card:hover {
      transform: translateY(-5px);
    }
    
    .card h2 {
      color: #333;
      font-size: 20px;
      margin-bottom: 20px;
      border-bottom: 3px solid #667eea;
      padding-bottom: 10px;
    }
    
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    table th {
      background: #f5f5f5;
      color: #333;
      padding: 12px;
      text-align: left;
      font-weight: 600;
      border-bottom: 2px solid #ddd;
    }
    
    table td {
      padding: 12px;
      border-bottom: 1px solid #eee;
      color: #666;
    }
    
    table tr:hover {
      background: #f9f9f9;
    }
    
    .status {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    
    .status.hadir {
      background: #d4edda;
      color: #155724;
    }
    
    .status.alfa {
      background: #f8d7da;
      color: #721c24;
    }
    
    .status.sakit {
      background: #fff3cd;
      color: #856404;
    }
    
    .status.izin {
      background: #d1ecf1;
      color: #0c5460;
    }
    
    .form-group {
      margin-bottom: 15px;
    }
    
    .form-group label {
      display: block;
      color: #333;
      font-weight: 600;
      margin-bottom: 5px;
      font-size: 14px;
    }
    
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      font-family: inherit;
    }
    
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }
    
    .btn {
      display: inline-block;
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s ease;
      width: 100%;
    }
    
    .btn:hover {
      background: #5568d3;
    }
    
    .btn-secondary {
      background: #6c757d;
    }
    
    .btn-secondary:hover {
      background: #5a6268;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }
    
    .alert {
      padding: 15px;
      border-radius: 5px;
      margin-bottom: 15px;
      display: none;
    }
    
    .alert.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
      display: block;
    }
    
    .alert.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
      display: block;
    }
    
    .loading {
      text-align: center;
      padding: 20px;
      color: #999;
    }
    
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @media (max-width: 768px) {
      .dashboard {
        grid-template-columns: 1fr;
      }
      
      .header h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📊 Dashboard WALAS</h1>
      <p id="datetime">Tanggal & Waktu akan dimuat...</p>
    </div>
    
    <div id="alert"></div>
    
    <div class="dashboard">
      <!-- ABSENSI HARI INI -->
      <div class="card">
        <h2>📋 Absensi Hari Ini</h2>
        <div id="absence-content">
          <div class="loading">
            <div class="spinner"></div>
            <p>Memuat data...</p>
          </div>
        </div>
      </div>
      
      <!-- JADWAL HARI INI -->
      <div class="card">
        <h2>📅 Jadwal Pelajaran Hari Ini</h2>
        <div id="schedule-content">
          <div class="loading">
            <div class="spinner"></div>
            <p>Memuat data...</p>
          </div>
        </div>
      </div>
      
      <!-- INPUT ABSENSI -->
      <div class="card">
        <h2>➕ Input Absensi</h2>
        <div class="form-group">
          <label>Pilih Siswa</label>
          <select id="studentSelect">
            <option value="">-- Pilih Siswa --</option>
          </select>
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="statusSelect">
            <option value="">-- Pilih Status --</option>
            <option value="Hadir">✓ Hadir</option>
            <option value="Alfa">✗ Alfa</option>
            <option value="Sakit">🏥 Sakit</option>
            <option value="Izin">📋 Izin</option>
          </select>
        </div>
        <button class="btn" onclick="recordAbsence()">Catat Absensi</button>
      </div>
      
      <!-- TUGAS PENDING -->
      <div class="card">
        <h2>📝 Tugas Belum Dikerjakan</h2>
        <div id="tasks-content">
          <div class="loading">
            <div class="spinner"></div>
            <p>Memuat data...</p>
          </div>
        </div>
      </div>
      
      <!-- STATISTIK SISWA -->
      <div class="card">
        <h2>👥 Statistik Siswa</h2>
        <div id="students-content">
          <div class="loading">
            <div class="spinner"></div>
            <p>Memuat data...</p>
          </div>
        </div>
      </div>
      
      <!-- EXPORT REKAP -->
      <div class="card">
        <h2>📥 Export Rekap Bulanan</h2>
        <div class="form-group">
          <label>Bulan</label>
          <select id="monthSelect">
            <option value="">-- Pilih Bulan --</option>
            <option value="1">Januari</option>
            <option value="2">Februari</option>
            <option value="3">Maret</option>
            <option value="4">April</option>
            <option value="5">Mei</option>
            <option value="6">Juni</option>
            <option value="7">Juli</option>
            <option value="8">Agustus</option>
            <option value="9">September</option>
            <option value="10">Oktober</option>
            <option value="11">November</option>
            <option value="12">Desember</option>
          </select>
        </div>
        <div class="form-group">
          <label>Tahun</label>
          <input type="number" id="yearInput" value="2024" min="2020" max="2099">
        </div>
        <button class="btn btn-secondary" onclick="generateRecap()">Generate Rekap</button>
      </div>
    </div>
  </div>
  
  <script>
    // Update tanggal dan waktu
    function updateDateTime() {
      const now = new Date();
      const options = { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit'
      };
      document.getElementById('datetime').textContent = now.toLocaleDateString('id-ID', options);
    }
    updateDateTime();
    setInterval(updateDateTime, 60000);
    
    // Load semua data saat halaman dibuka
    function loadAllData() {
      google.script.run.withSuccessHandler(data => {
        if (data.success) {
          loadStudentList(data.students);
          loadAbsence(data.todayAbsence);
          loadSchedule(data.todaySchedule);
          loadTasks(data.pendingTasks);
          loadStudentStats(data.students);
        }
      }).getAllDashboardData();
    }
    
    // Load daftar siswa
    function loadStudentList(data) {
      if (data.success) {
        const select = document.getElementById('studentSelect');
        select.innerHTML = '<option value="">-- Pilih Siswa --</option>';
        data.data.forEach(student => {
          const option = document.createElement('option');
          option.value = student.nama;
          option.textContent = student.nama;
          select.appendChild(option);
        });
      }
    }
    
    // Load absensi hari ini
    function loadAbsence(data) {
      const content = document.getElementById('absence-content');
      
      if (!data.success) {
        content.innerHTML = '<p style="color: red;">' + data.message + '</p>';
        return;
      }
      
      if (data.data.length === 0) {
        content.innerHTML = '<div class="empty-state">Belum ada data absensi hari ini</div>';
        return;
      }
      
      let html = '<table><thead><tr><th>Nama Siswa</th><th>Status</th></tr></thead><tbody>';
      data.data.forEach(item => {
        const statusClass = item.status.toLowerCase();
        html += `<tr>
          <td>${item.namaSiswa}</td>
          <td><span class="status ${statusClass}">${item.status}</span></td>
        </tr>`;
      });
      html += '</tbody></table>';
      content.innerHTML = html;
    }
    
    // Load jadwal hari ini
    function loadSchedule(data) {
      const content = document.getElementById('schedule-content');
      
      if (!data.success) {
        content.innerHTML = '<p style="color: red;">' + data.message + '</p>';
        return;
      }
      
      if (data.data.length === 0) {
        content.innerHTML = '<div class="empty-state">Tidak ada jadwal hari ini</div>';
        return;
      }
      
      let html = '<table><thead><tr><th>Mata Pelajaran</th><th>Guru</th><th>Jam</th></tr></thead><tbody>';
      data.data.forEach(item => {
        html += `<tr>
          <td>${item.mapel}</td>
          <td>${item.guru}</td>
          <td>${item.jamMulai} - ${item.jamSelesai}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      content.innerHTML = html;
    }
    
    // Load tugas pending
    function loadTasks(data) {
      const content = document.getElementById('tasks-content');
      
      if (!data.success) {
        content.innerHTML = '<p style="color: red;">' + data.message + '</p>';
        return;
      }
      
      if (data.data.length === 0) {
        content.innerHTML = '<div class="empty-state">Tidak ada tugas pending</div>';
        return;
      }
      
      let html = '<table><thead><tr><th>Mata Pelajaran</th><th>Deskripsi</th><th>Deadline</th></tr></thead><tbody>';
      data.data.forEach(item => {
        html += `<tr>
          <td>${item.mapel}</td>
          <td>${item.deskripsi}</td>
          <td>${item.deadline}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      content.innerHTML = html;
    }
    
    // Load statistik siswa
    function loadStudentStats(data) {
      const content = document.getElementById('students-content');
      
      if (data.success) {
        const count = data.count;
        content.innerHTML = `
          <div style="text-align: center; padding: 20px;">
            <div style="font-size: 48px; color: #667eea; font-weight: bold;">${count}</div>
            <div style="color: #999; margin-top: 10px;">Total Siswa Terdaftar</div>
          </div>
        `;
      }
    }
    
    // Record absensi
    function recordAbsence() {
      const nama = document.getElementById('studentSelect').value;
      const status = document.getElementById('statusSelect').value;
      
      if (!nama || !status) {
        showAlert('Silakan pilih siswa dan status', 'error');
        return;
      }
      
      google.script.run.withSuccessHandler(response => {
        if (response.success) {
          showAlert(response.message, 'success');
          document.getElementById('studentSelect').value = '';
          document.getElementById('statusSelect').value = '';
          loadAllData();
        } else {
          showAlert(response.message, 'error');
        }
      }).recordAbsence(nama, status);
    }
    
    // Generate rekap
    function generateRecap() {
      const month = document.getElementById('monthSelect').value;
      const year = document.getElementById('yearInput').value;
      
      if (!month || !year) {
        showAlert('Silakan pilih bulan dan tahun', 'error');
        return;
      }
      
      google.script.run.withSuccessHandler(response => {
        if (response.success) {
          showAlert(response.message + '. Sheet: ' + response.sheetName, 'success');
        } else {
          showAlert(response.message, 'error');
        }
      }).generateMonthlyRecap(parseInt(month), parseInt(year));
    }
    
    // Show alert
    function showAlert(message, type) {
      const alert = document.getElementById('alert');
      alert.className = 'alert ' + type;
      alert.textContent = message;
      alert.style.display = 'block';
      
      setTimeout(() => {
        alert.style.display = 'none';
      }, 5000);
    }
    
    // Load data on page load
    window.addEventListener('load', loadAllData);
    
    // Refresh data setiap 5 menit
    setInterval(loadAllData, 300000);
  </script>
</body>
</html>
